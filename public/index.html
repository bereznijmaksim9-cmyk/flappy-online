<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy PRO + Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        body { margin: 0; background: #111; color: white; font-family: 'Fredoka One', cursive; overflow: hidden; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #555; z-index: 10; width: 300px; max-height: 80vh; overflow-y: auto; }
        h1, h2 { margin-top: 0; color: #ffeb3b; }
        input, button { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; font-family: inherit; font-size: 16px; outline: none; }
        button { background: #4CAF50; color: white; cursor: pointer; border-bottom: 4px solid #2E7D32; }
        button:active { transform: translateY(4px); border-bottom: 0; margin-bottom: 12px; }
        
        .room-item { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #555; }
        .room-item:hover { background: #444; }
        .shop-item { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 5; }
        .hud-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; font-size: 16px; margin: 10px; pointer-events: auto; }
        #top-left { position: absolute; top: 10px; left: 10px; }
        #top-right { position: absolute; top: 10px; right: 10px; }
        #leave-btn { background: #E53935; border-bottom-color: #B71C1C; padding: 5px 15px; width: auto; margin: 0; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menu" class="panel">
        <h1>Flappy Online</h1>
        <div>💰 Монеты: <span id="menuCoins">0</span></div>
        <div>🏆 Рекорд: <span id="menuRecord">0</span></div>
        
        <input type="text" id="playerName" placeholder="Твой никнейм" maxlength="10">
        
        <h3>Лобби</h3>
        <div id="roomList">Загрузка лобби...</div>
        
        <input type="text" id="newRoomId" placeholder="Название новой комнаты">
        <button onclick="createRoom()">Создать и Играть</button>
        <button onclick="toggleShop()" style="background:#FF9800; border-color:#F57C00;">🛒 Магазин скинов</button>
    </div>

    <!-- МАГАЗИН -->
    <div id="shop" class="panel hidden">
        <h2>Магазин</h2>
        <div>💰 Монеты: <span id="shopCoins">0</span></div>
        <div class="shop-item">
            <span>Радужный (50 💰)</span><br>
            <button onclick="buySkin('rainbow', 50)">Купить / Надеть</button>
        </div>
        <div class="shop-item">
            <span>Зебра (100 💰)</span><br>
            <button onclick="buySkin('zebra', 100)">Купить / Надеть</button>
        </div>
        <div class="shop-item">
            <span>Обычный</span><br>
            <button onclick="equipSkin('default')">Надеть</button>
        </div>
        <button onclick="toggleShop()" style="background:#757575; border-color:#424242;">Назад</button>
    </div>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
    <div id="game-ui">
        <div id="top-left" class="hud-box">
            <div id="leaderboard"></div>
        </div>
        <div id="top-right">
            <div class="hud-box">💰 <span id="gameCoins">0</span></div>
            <button id="leave-btn" onclick="leaveGame()">Выйти</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // Виртуальное разрешение (чтобы на всех экранах игра была одинаковой)
        const VW = 400;
        const VH = 600;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let scale = 1;

        // Данные игрока (Сохраняем в память телефона)
        let savedCoins = parseInt(localStorage.getItem('coins')) || 0;
        let bestRecord = parseInt(localStorage.getItem('record')) || 0;
        let mySkin = localStorage.getItem('skin') || 'default';
        let unlockedSkins = JSON.parse(localStorage.getItem('unlockedSkins')) || ['default'];
        
        // Генерируем случайный цвет для обычной птицы, если нет скина
        let myColor = localStorage.getItem('color') || '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        localStorage.setItem('color', myColor);

        // Обновляем текст в меню
        document.getElementById('menuCoins').innerText = savedCoins;
        document.getElementById('menuRecord').innerText = bestRecord;
        document.getElementById('shopCoins').innerText = savedCoins;

        let myId = '', currentRoom = '', players = {};
        let gameState = 'menu'; // menu, ready, playing, dead
        let gameLoop, networkInterval;
        let speed = 4; // Скорость скроллинга
        
        let bird = { x: 100, y: VH/2, velocity: 0, gravity: 0.5, jump: -8, size: 16, score: 0, distance: 0 };
        let pipes = [];
        let coinsArr = [];
        let pipeCount = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Вычисляем масштаб так, чтобы игра влезала в экран по высоте и ширине
            scale = Math.min(window.innerWidth / VW, window.innerHeight / VH);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- МАГАЗИН ---
        function toggleShop() {
            document.getElementById('menu').classList.toggle('hidden');
            document.getElementById('shop').classList.toggle('hidden');
        }

        function buySkin(skinId, price) {
            if (unlockedSkins.includes(skinId)) {
                equipSkin(skinId);
            } else if (savedCoins >= price) {
                savedCoins -= price;
                unlockedSkins.push(skinId);
                localStorage.setItem('coins', savedCoins);
                localStorage.setItem('unlockedSkins', JSON.stringify(unlockedSkins));
                document.getElementById('shopCoins').innerText = savedCoins;
                document.getElementById('menuCoins').innerText = savedCoins;
                equipSkin(skinId);
                alert('Скин куплен!');
            } else {
                alert('Не хватает монет!');
            }
        }

        function equipSkin(skinId) {
            if (unlockedSkins.includes(skinId)) {
                mySkin = skinId;
                localStorage.setItem('skin', skinId);
                alert('Скин надет!');
            }
        }

        // --- ЛОББИ И СЕТЬ ---
        socket.on('connect', () => { myId = socket.id; });

        socket.on('roomList', (list) => {
            let html = '';
            if(list.length === 0) html = '<p>Нет активных комнат</p>';
            list.forEach(r => {
                html += `<div class="room-item" onclick="joinRoom('${r.id}')">
                            <span>🎮 ${r.id}</span> <span>Игроков: ${r.count}</span>
                         </div>`;
            });
            document.getElementById('roomList').innerHTML = html;
        });

        socket.on('roomState', (serverPlayers) => { players = serverPlayers; updateLeaderboard(); });
        socket.on('playerMoved', (data) => {
            if (players[data.id]) {
                players[data.id].y = data.y;
                players[data.id].distance = data.distance; // Синхронизируем дистанцию!
                players[data.id].score = data.score;
                players[data.id].alive = data.alive;
                updateLeaderboard();
            }
        });

        function createRoom() {
            let id = document.getElementById('newRoomId').value.trim();
            if(!id) id = 'Комната_' + Math.floor(Math.random()*1000);
            joinRoom(id);
        }

        function joinRoom(roomId) {
            let name = document.getElementById('playerName').value.trim() || 'Игрок';
            currentRoom = roomId;
            socket.emit('joinRoom', { roomId, playerName: name, color: myColor, skin: mySkin });
            
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game-ui').style.display = 'block';
            
            resetGame();
            gameLoop = requestAnimationFrame(update);
            
            networkInterval = setInterval(() => {
                if(gameState === 'playing' || gameState === 'ready') {
                    socket.emit('updateState', { 
                        roomId: currentRoom, score: bird.score, alive: true, y: Math.round(bird.y), distance: bird.distance 
                    });
                }
            }, 50);
        }

        function leaveGame() {
            gameState = 'menu';
            cancelAnimationFrame(gameLoop);
            clearInterval(networkInterval);
            socket.emit('leaveRoom', { roomId: currentRoom });
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('menu').classList.remove('hidden');
        }

        // --- ЛОГИКА ---
        function resetGame() {
            bird = { x: 100, y: VH/2, velocity: 0, gravity: 0.5, jump: -8, size: 16, score: 0, distance: 0 };
            pipes = []; coinsArr = []; pipeCount = 0;
            document.getElementById('gameCoins').innerText = savedCoins;
            gameState = 'ready';
        }

        function flap() {
            if (gameState === 'menu') return;
            if (gameState === 'ready') gameState = 'playing';
            if (gameState === 'playing' || gameState === 'ready') bird.velocity = bird.jump;
            if (gameState === 'dead') resetGame();
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') flap(); });
        window.addEventListener('touchstart', flap);
        window.addEventListener('mousedown', (e) => { if(e.target.id !== 'leave-btn') flap(); });

        function getDeterministicRandom(index) {
            let seed = 0;
            for(let i = 0; i < currentRoom.length; i++) seed += currentRoom.charCodeAt(i);
            let x = Math.sin(seed + index * 1.2345) * 10000;
            return x - Math.floor(x);
        }

        function addPipe() {
            let gap = 150;
            let minHeight = 50;
            let maxHeight = VH - gap - minHeight;
            let rand = getDeterministicRandom(pipeCount);
            let topHeight = rand * (maxHeight - minHeight) + minHeight;

            let spawnDistance = bird.distance + VW; // Спавним за экраном
            pipes.push({ distance: spawnDistance, top: topHeight, bottom: topHeight + gap, width: 60, passed: false });
            
            // С шансом 50% спавним монетку между трубами
            if (getDeterministicRandom(pipeCount + 1000) > 0.5) {
                coinsArr.push({ distance: spawnDistance + 20, y: topHeight + gap/2, collected: false });
            }
            pipeCount++;
        }

        function updateLeaderboard() {
            let html = '';
            let sortedIds = Object.keys(players).sort((a, b) => players[b].score - players[a].score);
            sortedIds.forEach(id => {
                let p = players[id];
                html += `<div style="color:${p.color}">${p.name}: ${p.score} ${p.alive?'':'💀'}</div>`;
            });
            document.getElementById('leaderboard').innerHTML = html;
        }

        // --- ОТРИСОВКА ---
        function drawBird(x, y, rotation, pColor, pSkin, isGhost, name) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.globalAlpha = isGhost ? 0.5 : 1.0;

            ctx.beginPath(); ctx.arc(0, 0, bird.size, 0, Math.PI*2);
            
            // Применяем скины
            if (pSkin === 'rainbow') {
                let grad = ctx.createLinearGradient(-16, -16, 16, 16);
                grad.addColorStop(0, "red"); grad.addColorStop(0.33, "yellow"); grad.addColorStop(0.66, "green"); grad.addColorStop(1, "blue");
                ctx.fillStyle = grad;
            } else if (pSkin === 'zebra') {
                let grad = ctx.createRepeatingLinearGradient(-16, -16, 16, 16);
                grad.addColorStop(0, "white"); grad.addColorStop(0.5, "white"); grad.addColorStop(0.5, "black"); grad.addColorStop(1, "black");
                ctx.fillStyle = grad;
            } else {
                ctx.fillStyle = pColor || '#FFEB3B';
            }
            
            ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = 'black'; ctx.stroke();
            
            // Глаз
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(6, -6, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(8, -6, 2, 0, Math.PI*2); ctx.fill();
            // Клюв
            ctx.fillStyle = '#FF9800'; ctx.beginPath(); ctx.arc(10, 4, 8, -Math.PI/4, Math.PI/4); ctx.fill(); ctx.stroke();
            ctx.restore();

            if (isGhost && name) {
                ctx.fillStyle = 'white'; ctx.font = '12px Fredoka One'; ctx.textAlign = 'center';
                ctx.fillText(name, x, y - 25);
            }
        }

        function update() {
            if (gameState === 'menu') return;
            
            // Масштабируем холст
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width/2 - (VW*scale)/2, canvas.height/2 - (VH*scale)/2);
            ctx.scale(scale, scale);
            
            // Фон (ограничен виртуальными размерами)
            let bgGrad = ctx.createLinearGradient(0, 0, 0, VH);
            bgGrad.addColorStop(0, '#4fc3f7'); bgGrad.addColorStop(1, '#e1f5fe');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, VW, VH);

            if (gameState === 'ready') {
                bird.y = VH / 2 + Math.sin(Date.now() / 200) * 10;
                drawBird(bird.x, bird.y, 0, myColor, mySkin, false);
                ctx.fillStyle = 'white'; ctx.strokeStyle = 'black'; ctx.lineWidth = 4; ctx.font = '30px Fredoka One'; ctx.textAlign = 'center';
                ctx.strokeText('ТАПНИ ЧТОБЫ НАЧАТЬ', VW/2, VH/2 + 80); ctx.fillText('ТАПНИ ЧТОБЫ НАЧАТЬ', VW/2, VH/2 + 80);
                ctx.restore();
                gameLoop = requestAnimationFrame(update);
                return;
            }

            if (gameState === 'playing') {
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;
                bird.distance += speed; // Двигаемся вперед!

                if (bird.y + bird.size >= VH || bird.y - bird.size <= 0) die();

                // Спавн труб по пройденной дистанции
                if (bird.distance % 250 === 0) addPipe();

                // Логика труб
                for (let i = pipes.length - 1; i >= 0; i--) {
                    let p = pipes[i];
                    let screenX = p.distance - bird.distance + bird.x; // Высчитываем позицию трубы на экране!

                    if (bird.x + bird.size - 4 > screenX && bird.x - bird.size + 4 < screenX + p.width &&
                        (bird.y - bird.size + 4 < p.top || bird.y + bird.size - 4 > p.bottom)) die();

                    if (screenX + p.width < bird.x && !p.passed) {
                        bird.score++; p.passed = true; updateLeaderboard();
                    }
                    if (screenX + p.width < -50) pipes.splice(i, 1);
                }

                // Логика монет
                for (let i = coinsArr.length - 1; i >= 0; i--) {
                    let c = coinsArr[i];
                    let screenX = c.distance - bird.distance + bird.x;
                    
                    // Сбор монеты (радиус 15)
                    if (!c.collected && Math.hypot(bird.x - screenX, bird.y - c.y) < bird.size + 15) {
                        c.collected = true;
                        savedCoins++;
                        localStorage.setItem('coins', savedCoins);
                        document.getElementById('gameCoins').innerText = savedCoins;
                    }
                    if (screenX < -50) coinsArr.splice(i, 1);
                }
            }

            // Отрисовка труб
            pipes.forEach(p => {
                let screenX = p.distance - bird.distance + bird.x;
                ctx.fillStyle = '#8BC34A';
                ctx.fillRect(screenX, 0, p.width, p.top);
                ctx.fillRect(screenX - 5, p.top - 20, p.width + 10, 20);
                ctx.fillRect(screenX, p.bottom, p.width, VH - p.bottom);
                ctx.fillRect(screenX - 5, p.bottom, p.width + 10, 20);
                ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
                ctx.strokeRect(screenX, 0, p.width, p.top);
                ctx.strokeRect(screenX, p.bottom, p.width, VH - p.bottom);
            });

            // Отрисовка монет
            coinsArr.forEach(c => {
                if(!c.collected) {
                    let screenX = c.distance - bird.distance + bird.x;
                    ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(screenX, c.y, 15, 0, Math.PI*2); ctx.fill();
                    ctx.lineWidth = 2; ctx.strokeStyle = '#B8860B'; ctx.stroke();
                    ctx.fillStyle = '#DAA520'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.fillText('$', screenX, c.y+6);
                }
            });

            // Отрисовка других игроков (рассинхрон X!)
            for (let id in players) {
                if (id !== myId && players[id].alive) {
                    let p = players[id];
                    // Считаем где они на экране относительно нашей дистанции
                    let relativeX = bird.x + (p.distance - bird.distance);
                    // Отрисовываем их только если они в пределах экрана
                    if (relativeX > -50 && relativeX < VW + 50) {
                        drawBird(relativeX, p.y, 0, p.color, p.skin, true, p.name);
                    }
                }
            }

            // Отрисовка себя
            if (gameState !== 'dead') {
                let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (bird.velocity * 0.1)));
                drawBird(bird.x, bird.y, rotation, myColor, mySkin, false);
            } else {
                ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('💥', bird.x, bird.y);
            }

            // Счет
            if (gameState === 'playing') {
                ctx.fillStyle = 'white'; ctx.strokeStyle = 'black'; ctx.lineWidth = 6;
                ctx.font = '60px Fredoka One'; ctx.textAlign = 'center';
                ctx.strokeText(bird.score, VW / 2, 80); ctx.fillText(bird.score, VW / 2, 80);
            }

            // Экран смерти
            if (gameState === 'dead') {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, VW, VH);
                ctx.fillStyle = "white"; ctx.textAlign = 'center';
                ctx.font = "30px Fredoka One"; ctx.fillText("ИГРА ОКОНЧЕНА", VW / 2, VH / 2 - 20);
                ctx.font = "16px Fredoka One"; ctx.fillText("Тапни чтобы попробовать снова", VW / 2, VH / 2 + 30);
            }

            ctx.restore(); // Сбрасываем масштабирование перед следующим кадром
            gameLoop = requestAnimationFrame(update);
        }

        function die() {
            gameState = 'dead';
            socket.emit('updateState', { roomId: currentRoom, score: bird.score, alive: false, y: Math.round(bird.y), distance: bird.distance });
            
            // Сохранение рекорда
            if (bird.score > bestRecord) {
                bestRecord = bird.score;
                localStorage.setItem('record', bestRecord);
                document.getElementById('menuRecord').innerText = bestRecord;
            }
            updateLeaderboard();
        }
    </script>
</body>
</html>
