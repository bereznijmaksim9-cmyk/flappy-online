<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        input, button { margin: 5px 0; padding: 10px; width: 90%; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #4CAF50; color: white; cursor: pointer; font-weight: bold; }
        canvas { display: none; width: 100vw; height: 100vh; }
        #leaderboard { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 5px; display: none; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h2>Flappy Online</h2>
    <input type="text" id="playerName" placeholder="Твое имя"><br>
    <input type="text" id="roomId" placeholder="Код комнаты (например, 777)"><br>
    <button onclick="joinGame()">Подключиться и играть</button>
</div>

<div id="leaderboard"></div>
<canvas id="gameCanvas"></canvas>

<script>
    const socket = io(); // Автоматически подключается к текущему серверу
    const ui = document.getElementById('ui');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const leaderboard = document.getElementById('leaderboard');

    let myRoom = '';
    let playersData = {};
    
    // Адаптация под экран телефона
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let bird = { x: 50, y: canvas.height / 2, size: 30, velocity: 0, gravity: 0.5, jump: -8 };
    let pipes = [];
    let score = 0;
    let isPlaying = false;
    let isDead = false;

    function joinGame() {
        const myName = document.getElementById('playerName').value || 'Игрок';
        myRoom = document.getElementById('roomId').value || '1';
        
        ui.style.display = 'none';
        canvas.style.display = 'block';
        leaderboard.style.display = 'block';
        
        socket.emit('joinRoom', { roomId: myRoom, playerName: myName });
        resetGame();
        isPlaying = true;
        loop();
    }

    socket.on('roomState', (players) => {
        playersData = players;
        let html = 'Счет:<br>';
        for (let id in playersData) {
            let p = playersData[id];
            html += `${p.name}: ${p.score} ${p.alive ? '' : '(Разбился)'}<br>`;
        }
        leaderboard.innerHTML = html;
    });

    function resetGame() {
        bird.y = canvas.height / 2;
        bird.velocity = 0;
        pipes = [];
        score = 0;
        isDead = false;
        socket.emit('scoreUpdate', { roomId: myRoom, score: 0 });
        spawnPipe();
    }

    function spawnPipe() {
        const gap = 160; // Расстояние между верхней и нижней трубой
        const minHeight = 50;
        const maxHeight = canvas.height - gap - minHeight;
        const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
        
        pipes.push({ x: canvas.width, top: topHeight, bottom: topHeight + gap, width: 60, passed: false });
    }

    // Прыжок по касанию экрана или клику
    window.addEventListener('pointerdown', () => {
        if (isPlaying && !isDead) {
            bird.velocity = bird.jump;
        } else if (isDead) {
            resetGame();
        }
    });

    function update() {
        if (isDead) return;

        bird.velocity += bird.gravity;
        bird.y += bird.velocity;

        // Падение на землю или улет за экран
        if (bird.y + bird.size > canvas.height || bird.y < 0) die();

        // Добавление новых труб
        if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 250) {
            spawnPipe();
        }

        pipes.forEach(pipe => {
            pipe.x -= 3; // Скорость игры

            // Столкновение с трубами
            if (bird.x < pipe.x + pipe.width && bird.x + bird.size > pipe.x) {
                if (bird.y < pipe.top || bird.y + bird.size > pipe.bottom) die();
            }

            // Начисление очков
            if (pipe.x + pipe.width < bird.x && !pipe.passed) {
                score++;
                pipe.passed = true;
                socket.emit('scoreUpdate', { roomId: myRoom, score: score });
            }
        });

        // Удаление труб, ушедших за экран
        pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
    }

    function die() {
        isDead = true;
        socket.emit('playerDied', { roomId: myRoom });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Птичка
        ctx.fillStyle = '#FFD700'; // Желтая
        ctx.fillRect(bird.x, bird.y, bird.size, bird.size);

        // Трубы
        ctx.fillStyle = '#228B22'; // Зеленые
        pipes.forEach(pipe => {
            ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
            ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height - pipe.bottom);
        });

        // Текст смерти
        if (isDead) {
            ctx.fillStyle = 'black';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Ты разбился! Нажми, чтобы начать заново', canvas.width / 2, canvas.height / 2);
        }
    }

    function loop() {
        if (isPlaying) {
            update();
            draw();
            requestAnimationFrame(loop);
        }
    }
</script>
</body>
</html>
